# Ejemplo completo de workflow CI/CD con Docker Build
# Para usar con runners auto-hospedados en Proxmox LXC
#
# Requisitos:
# - Runner con Docker Engine instalado
# - Secrets configurados en GitHub:
#   * DOCKER_USERNAME: Tu usuario de Docker Hub
#   * DOCKER_PASSWORD: Tu password o token de acceso
#   * DOCKER_REGISTRY_URL: (opcional) URL del registry

name: CI/CD Docker Build and Push

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ github.repository }}
  DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}

jobs:
  # ============================================================
  # Job 1: Build y Test
  # ============================================================
  build-and-test:
    name: Build & Test
    runs-on: self-hosted  # Usa tu runner auto-hospedado
    container:
      image: docker:latest
      options: --privileged  # Necesario para Docker-in-Docker
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker BuildKit
        run: |
          export DOCKER_BUILDKIT=1
          echo "DOCKER_BUILDKIT=1" >> $GITHUB_ENV

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extraer metadatos de Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Construir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/image.tar

      - name: Ejecutar tests en contenedor
        run: |
          docker load -i /tmp/image.tar
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          docker run --rm $IMAGE_TAG npm test || echo "Tests no configurados"

      - name: Subir artefacto de imagen
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v3
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ============================================================
  # Job 2: Push a Registry (solo en push a main/tags)
  # ============================================================
  build-and-push:
    name: Build & Push
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: self-hosted
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extraer metadatos de Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Configurar QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'arm64,amd64'

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Construir y push (multi-plataforma)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verificar imagen subida
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)
          echo "✅ Imagen subida: $IMAGE_TAG"
          docker pull $IMAGE_TAG
          docker images | grep $IMAGE_NAME

  # ============================================================
  # Job 3: Deploy (solo en tags de versión)
  # ============================================================
  deploy:
    name: Deploy
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: self-hosted
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extraer versión del tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "🚀 Desplegando versión: $VERSION"

      - name: Desplegar con Docker Compose
        run: |
          # Ejemplo de despliegue con docker-compose
          export IMAGE_TAG=${{ steps.version.outputs.version }}
          
          # Crear o actualizar docker-compose.yml
          cat > docker-compose.prod.yml << EOF
          version: '3.8'
          services:
            app:
              image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
              container_name: myapp-${{ steps.version.outputs.version }}
              restart: unless-stopped
              ports:
                - "8080:8080"
              environment:
                - NODE_ENV=production
              volumes:
                - app-data:/data
              networks:
                - app-network
          
          volumes:
            app-data:
          
          networks:
            app-network:
              driver: bridge
          EOF
          
          # Desplegar
          docker compose -f docker-compose.prod.yml up -d
          
          # Verificar despliegue
          sleep 5
          docker ps | grep myapp
          echo "✅ Desplegado exitosamente"

      - name: Verificar salud del servicio
        run: |
          # Esperar a que el servicio esté listo
          for i in {1..30}; do
            if curl -f http://localhost:8080/health 2>/dev/null; then
              echo "✅ Servicio saludable"
              exit 0
            fi
            echo "⏳ Esperando... ($i/30)"
            sleep 2
          done
          echo "❌ Timeout: Servicio no respondió"
          exit 1

      - name: Notificar despliegue
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "🎉 Despliegue exitoso de ${{ steps.version.outputs.version }}"
          else
            echo "❌ Despliegue fallido de ${{ steps.version.outputs.version }}"
          fi

  # ============================================================
  # Job 4: Limpieza (siempre)
  # ============================================================
  cleanup:
    name: Cleanup
    needs: [build-and-test, build-and-push, deploy]
    if: always()
    runs-on: self-hosted
    
    steps:
      - name: Limpiar imágenes dangling
        run: |
          echo "🧹 Limpiando recursos de Docker..."
          docker image prune -f
          docker container prune -f
          echo "✅ Limpieza completada"

      - name: Limpiar caché de GitHub Actions
        run: |
          # Opcional: limpiar caché antiguo
          echo "🗑️ Limpiando caché antiguo..."
          find /home/runner/actions-runner/_work -name "*.log" -mtime +7 -delete 2>/dev/null || true
          echo "✅ Limpieza de caché completada"
